version: 2
updates:
  # Theme build tooling.
  - package-ecosystem: "npm"
    directory: "/themes/LoveIt"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      npm:
        patterns:
          - "*"

  # Actions used by CI/CD workflows (.github/workflows).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    groups:
      github-actions:
        patterns:
          - "*"
